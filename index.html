<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Hash Generator</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#09090b;--s1:#131316;--s2:#1a1a1f;--s3:#232329;
--bd:#27272a;--bdh:#3f3f46;
--t1:#fafafa;--t2:#a1a1aa;--t3:#52525b;
--ac:#8b5cf6;--acg:rgba(139,92,246,.2);
--gr:#22c55e;--grg:rgba(34,197,94,.25);
--rd:#ef4444;--rdg:rgba(239,68,68,.3);
--r:12px;--tr:.2s ease
}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
background:var(--bg);color:var(--t1);
min-height:100vh;display:flex;flex-direction:column;align-items:center
}
body::before{
content:'';position:fixed;top:-300px;left:50%;transform:translateX(-50%);
width:600px;height:600px;
background:radial-gradient(circle,rgba(139,92,246,.08),transparent 70%);
pointer-events:none;z-index:0
}

/* Header */
.hdr{
width:100%;max-width:640px;padding:24px 20px 0;
display:flex;justify-content:space-between;align-items:center;
position:relative;z-index:1
}
.brand a{
color:var(--t2);text-decoration:none;font-size:13px;font-weight:500;
transition:color var(--tr)
}
.brand a:hover{color:var(--ac)}
.lang-sel{
background:var(--s2);border:1px solid var(--bd);color:var(--t2);
font-size:13px;padding:6px 10px;border-radius:8px;cursor:pointer;outline:none;
font-family:inherit
}
.lang-sel:focus{border-color:var(--ac)}

/* Wrap */
.wrap{width:100%;max-width:640px;padding:20px;position:relative;z-index:1}
.heading{text-align:center;margin-bottom:4px}
.heading h1{font-size:24px;font-weight:700;letter-spacing:-.02em}
.heading p{color:var(--t3);font-size:14px;margin-top:6px}

/* Tabs */
.tabs{
display:flex;background:var(--s1);border:1px solid var(--bd);
border-radius:10px;padding:4px;margin:24px 0 20px
}
.tab-btn{
flex:1;padding:11px;font-size:14px;font-weight:600;font-family:inherit;
background:none;border:none;color:var(--t3);cursor:pointer;
border-radius:7px;transition:all var(--tr)
}
.tab-btn:hover{color:var(--t2)}
.tab-btn.active{
color:var(--t1);background:var(--s3);
box-shadow:0 2px 8px rgba(0,0,0,.3)
}

/* Panels */
.panel{display:none}
.panel.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{
from{opacity:0;transform:translateY(6px)}
to{opacity:1;transform:translateY(0)}
}

/* Record */
.rec-area{
display:flex;flex-direction:column;align-items:center;padding:36px 0 20px
}
.rec-wrap{
position:relative;width:100px;height:100px;
display:flex;align-items:center;justify-content:center
}
.ring{
position:absolute;inset:0;border-radius:50%;
border:2px solid var(--rd);opacity:0;pointer-events:none
}
.rec-wrap.on .ring{animation:pulse 2s ease-out infinite}
.rec-wrap.on .ring:nth-child(2){animation-delay:.5s}
.rec-wrap.on .ring:nth-child(3){animation-delay:1s}
@keyframes pulse{
0%{opacity:.5;transform:scale(1)}
100%{opacity:0;transform:scale(1.8)}
}
.rec-btn{
width:80px;height:80px;border-radius:50%;border:none;
background:linear-gradient(135deg,#ef4444,#dc2626);
cursor:pointer;display:flex;align-items:center;justify-content:center;
transition:all var(--tr);box-shadow:0 4px 20px var(--rdg);
position:relative;z-index:2
}
.rec-btn:hover{transform:scale(1.05)}
.rec-btn:active{transform:scale(.96)}
.rec-icon{
width:24px;height:24px;background:#fff;border-radius:50%;
transition:all var(--tr)
}
.rec-btn.on .rec-icon{border-radius:4px;width:22px;height:22px}
.timer{
font-family:'Courier New',monospace;font-size:26px;font-weight:700;
color:var(--t2);margin-top:16px;letter-spacing:.05em;transition:color var(--tr)
}
.timer.on{color:var(--rd)}
.rec-hint{color:var(--t3);font-size:13px;margin-top:8px}

/* Visualizer */
.viz{
display:flex;align-items:flex-end;justify-content:center;
gap:2px;height:44px;margin-top:16px;opacity:0;transition:opacity .3s
}
.viz.on{opacity:1}
.viz-bar{
width:3px;min-height:2px;background:var(--rd);border-radius:2px;
transition:height 60ms linear
}

/* Upload / Dropzone */
.dropzone{
border:2px dashed var(--bd);border-radius:var(--r);
padding:44px 20px;text-align:center;cursor:pointer;
transition:all var(--tr);background:var(--s1);position:relative
}
.dropzone:hover,.dropzone.over{
border-color:var(--ac);background:rgba(139,92,246,.05)
}
.drop-icon{font-size:38px;margin-bottom:12px;display:block}
.drop-txt{color:var(--t2);font-size:14px;font-weight:500}
.drop-sub{color:var(--t3);font-size:12px;margin-top:6px}
.dropzone input{
position:absolute;inset:0;width:100%;height:100%;
opacity:0;cursor:pointer
}

/* Player */
.player-box{margin-top:20px;display:none}
.player-box.show{display:block;animation:fadeUp .3s ease}
.player-lbl{
font-size:11px;font-weight:600;text-transform:uppercase;
letter-spacing:.08em;color:var(--t3);margin-bottom:8px
}
audio{width:100%;height:44px;border-radius:8px}

/* Processing spinner */
.proc{
display:none;flex-direction:column;align-items:center;
padding:28px;gap:12px
}
.proc.show{display:flex}
.spin{
width:32px;height:32px;border:3px solid var(--bd);
border-top-color:var(--ac);border-radius:50%;
animation:rot .7s linear infinite
}
@keyframes rot{to{transform:rotate(360deg)}}
.proc-txt{color:var(--t2);font-size:14px}

/* Result */
.result{margin-top:24px;display:none}
.result.show{display:block;animation:fadeUp .3s ease}
.res-lbl{
font-size:11px;font-weight:600;text-transform:uppercase;
letter-spacing:.08em;color:var(--t3);margin-bottom:8px
}
.hash-box{
background:#0c0c0e;border:1px solid var(--bd);border-radius:10px;
padding:18px;position:relative;overflow:hidden
}
.hash-box::before{
content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(--ac),transparent);opacity:.4
}
.hash-text{
font-family:'Courier New',monospace;font-size:13px;line-height:1.8;
color:var(--gr);word-break:break-all;
user-select:none;-webkit-user-select:none;-moz-user-select:none;
pointer-events:none
}
.hash-info{
display:flex;justify-content:flex-end;margin-top:8px;
padding-top:8px;border-top:1px solid var(--bd)
}
.hash-len{font-family:'Courier New',monospace;font-size:11px;color:var(--t3)}
.warn{
color:var(--t2);font-size:13px;line-height:1.5;margin-top:12px;
padding:10px 14px;background:rgba(139,92,246,.06);
border:1px solid rgba(139,92,246,.1);border-radius:10px
}
.copy-btn{
width:100%;margin-top:14px;padding:15px 20px;
font-family:inherit;font-size:15px;font-weight:600;
border:none;border-radius:10px;cursor:pointer;
background:linear-gradient(135deg,var(--ac),#7c3aed);
color:#fff;transition:all var(--tr);
box-shadow:0 4px 16px var(--acg)
}
.copy-btn:hover{
transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,92,246,.3)
}
.copy-btn:active{transform:translateY(0)}
.copy-btn.ok{
background:linear-gradient(135deg,var(--gr),#16a34a);
box-shadow:0 4px 16px var(--grg)
}

/* Footer */
.ftr{
margin-top:32px;padding-bottom:24px;
text-align:center;color:var(--t3);font-size:12px
}

@media(max-width:500px){
.wrap{padding:14px}
.heading h1{font-size:20px}
.hash-text{font-size:11px}
.rec-btn{width:68px;height:68px}
.rec-wrap{width:86px;height:86px}
}
</style>
</head>

<div class="hdr">
  <div class="brand">
    <a href="https://makerworld.com/ru/@SantaClaus" target="_blank" rel="noopener">Created by SantaClaus</a>
  </div>
  <select class="lang-sel" id="langSel" onchange="changeLang(this.value)">
    <option value="en">English</option>
    <option value="ru">Русский</option>
    <option value="es">Español</option>
    <option value="de">Deutsch</option>
    <option value="fr">Français</option>
    <option value="it">Italiano</option>
    <option value="pt">Português</option>
    <option value="zh">中文</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
    <option value="tr">Türkçe</option>
  </select>
</div>

<div class="wrap">
  <div class="heading">
    <h1 id="elTitle">Audio Hash Generator</h1>
    <p id="elSubtitle">Convert sound into a 100-character hash for 3D printing</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="btnTabRec" onclick="switchTab('record')">
      <span id="elTabRec">🎙️ Record</span>
    </button>
    <button class="tab-btn" id="btnTabUp" onclick="switchTab('upload')">
      <span id="elTabUp">📁 Upload</span>
    </button>
  </div>

  <div class="panel active" id="panelRecord">
    <div class="rec-area">
      <div class="rec-wrap" id="recWrap">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <button class="rec-btn" id="recBtn" onclick="toggleRecord()">
          <div class="rec-icon"></div>
        </button>
      </div>
      <div class="timer" id="timerEl">00:00</div>
      <div class="rec-hint" id="elRecHint">Tap to start recording</div>
      <div class="viz" id="viz"></div>
    </div>
  </div>

  <div class="panel" id="panelUpload">
    <div class="dropzone" id="dropzone">
      <span class="drop-icon">📂</span>
      <div class="drop-txt" id="elDropTxt">Drop audio file here or click to browse</div>
      <div class="drop-sub" id="elDropSub">MP3, WAV, M4A, WEBM</div>
      <input type="file" id="fileIn" accept=".mp3,.wav,.m4a,.webm,audio/*">
    </div>
  </div>

  <div class="proc" id="proc">
    <div class="spin"></div>
    <div class="proc-txt" id="elProc">Generating hash...</div>
  </div>

  <div class="player-box" id="playerBox">
    <div class="player-lbl" id="elPreview">Preview</div>
    <audio id="player" controls preload="auto"></audio>
  </div>

  <div class="result" id="resultBox">
    <div class="res-lbl" id="elResLbl">Generated Hash String</div>
    <div class="hash-box">
      <div class="hash-text" id="hashOut"></div>
      <div class="hash-info">
        <span class="hash-len" id="hashLen"></span>
      </div>
    </div>
    <div class="warn" id="elWarn"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyHash()">
      <span id="elCopyBtn">📋 Copy Hash for MakerWorld</span>
    </button>
  </div>
</div>

<div class="ftr">
  <span id="elFooter">100% client-side — No data is sent anywhere</span>
</div>

var curLang = "en";
var recording = false;
var mediaRec = null;
var recChunks = [];
var recStream = null;
var recAudioCtx = null;
var recAnalyser = null;
var vizAnimId = null;
var timerInterval = null;
var timerSec = 0;
var prevURL = null;
var copyTimer = null;
var BAR_N = 36;

/* ===== SAFE HELPERS ===== */
function $(id) { return document.getElementById(id); }

function t(key) {
  var lang = TR[curLang];
  if (lang && lang[key]) return lang[key];
  return TR.en[key] || key;
}

function pad2(n) {
  return (n < 10 ? "0" : "") + n;
}

/* ===== LANGUAGE ===== */
function changeLang(lang) {
  curLang = lang;
  applyLang();
}

function applyLang() {
  $("elTitle").textContent = t("title");
  $("elSubtitle").textContent = t("subtitle");
  $("elTabRec").textContent = t("tabRec");
  $("elTabUp").textContent = t("tabUp");
  $("elRecHint").textContent = recording ? t("recStop") : t("recHint");
  $("elDropTxt").textContent = t("dropTxt");
  $("elDropSub").textContent = t("dropSub");
  $("elPreview").textContent = t("preview");
  $("elProc").textContent = t("proc");
  $("elResLbl").textContent = t("resLbl");
  $("elWarn").textContent = t("warn");
  $("elFooter").textContent = t("footer");

  /* Copy button — only update if not in "copied" state */
  if (!copyTimer) {
    $("elCopyBtn").textContent = t("copyBtn");
  }

  /* Hash length */
  var hText = $("hashOut").textContent;
  if (hText && hText.length > 0) {
    $("hashLen").textContent = hText.length + " " + t("chars");
  }
}

/* ===== TAB SWITCHING ===== */
function switchTab(which) {
  if (which === "record") {
    $("btnTabRec").className = "tab-btn active";
    $("btnTabUp").className = "tab-btn";

  } else {
    $("btnTabUp").className = "tab-btn active";
    $("btnTabRec").className = "tab-btn";
    $("panelUpload").className = "panel active";
    $("panelRecord").className = "panel";
  }
}

/* ===== VISUALIZER BARS ===== */
(function initBars() {
  var viz = $("viz");
  for (var i = 0; i < BAR_N; i++) {
    var b = document.createElement("div");
    b.className = "viz-bar";
    b.style.height = "2px";
    viz.appendChild(b);
  }
})();

/* ===== RECORDING ===== */
function toggleRecord() {
  if (!recording) {
    startRec();
  } else {
    stopRec();
  }
}

function startRec() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert(t("micErr"));
    return;
  }

  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    recStream = stream;
    recording = true;
    recChunks = [];

    $("recBtn").className = "rec-btn on";
    $("recWrap").className = "rec-wrap on";
    $("timerEl").className = "timer on";
    $("viz").className = "viz on";
    $("elRecHint").textContent = t("recStop");

    /* Timer */
    timerSec = 0;
    $("timerEl").textContent = "00:00";
    timerInterval = setInterval(function() {
      timerSec++;
      $("timerEl").textContent = pad2(Math.floor(timerSec / 60)) + ":" + pad2(timerSec % 60);
    }, 1000);

    /* Visualizer */
    try {
      recAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var src = recAudioCtx.createMediaStreamSource(stream);
      recAnalyser = recAudioCtx.createAnalyser();
      recAnalyser.fftSize = 128;
      src.connect(recAnalyser);
      drawViz();
    } catch(e) {
      /* visualizer is optional — ignore errors */
    }

    /* MediaRecorder */
    var mimeList = [
      "audio/webm;codecs=opus",
      "audio/webm",
      "audio/ogg;codecs=opus",
      "audio/mp4",
      ""
    ];
    var chosenMime = "";
    for (var i = 0; i < mimeList.length; i++) {
      if (mimeList[i] === "" || MediaRecorder.isTypeSupported(mimeList[i])) {
        chosenMime = mimeList[i];
        break;
      }
    }

    var opts = chosenMime ? { mimeType: chosenMime } : {};
    mediaRec = new MediaRecorder(stream, opts);

    mediaRec.ondataavailable = function(ev) {
      if (ev.data && ev.data.size > 0) {
        recChunks.push(ev.data);
      }
    };

    mediaRec.onstop = function() {
      var finalMime = "audio/webm";
      try { finalMime = mediaRec.mimeType || chosenMime || "audio/webm"; } catch(e) {}
      var blob = new Blob(recChunks, { type: finalMime });
      handleBlob(blob);
    };

    mediaRec.start();

  }, function(err) {
    if (err && (err.name === "NotAllowedError" || err.name === "PermissionDeniedError")) {
      alert(t("micDenied"));
    } else {
      alert(t("micErr"));
    }
  });
}

function stopRec() {
  if (!recording) return;
  recording = false;

  /* Stop MediaRecorder */
  try {
    if (mediaRec && mediaRec.state !== "inactive") {
      mediaRec.stop();
    }
  } catch(e) {}

  /* Stop stream tracks */
  if (recStream) {
    try {
      var tracks = recStream.getTracks();
      for (var i = 0; i < tracks.length; i++) {
        tracks[i].stop();
      }
    } catch(e) {}
    recStream = null;
  }

  /* UI reset */
  $("recBtn").className = "rec-btn";
  $("recWrap").className = "rec-wrap";
  $("timerEl").className = "timer";
  $("viz").className = "viz";
  $("elRecHint").textContent = t("recHint");

  /* Clear timer */
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  /* Stop viz animation */
  if (vizAnimId) {
    cancelAnimationFrame(vizAnimId);
    vizAnimId = null;
  }

  /* Reset bars */
  var bars = $("viz").querySelectorAll(".viz-bar");
  for (var i = 0; i < bars.length; i++) {
    bars[i].style.height = "2px";
  }

  /* Close audio context */
  if (recAudioCtx) {
    try { recAudioCtx.close(); } catch(e) {}
    recAudioCtx = null;
    recAnalyser = null;
  }
}

function drawViz() {
  if (!recAnalyser || !recording) return;
  var data = new Uint8Array(recAnalyser.frequencyBinCount);
  recAnalyser.getByteFrequencyData(data);
  var bars = $("viz").querySelectorAll(".viz-bar");
  var step = Math.floor(data.length / BAR_N);
  if (step < 1) step = 1;
  for (var i = 0; i < BAR_N; i++) {
    var val = data[i * step] || 0;
    var h = Math.max(2, (val / 255) * 44);
    if (i < bars.length) bars[i].style.height = h + "px";
  }
  vizAnimId = requestAnimationFrame(drawViz);
}

/* ===== FILE UPLOAD ===== */
(function initUpload() {
  var dz = $("dropzone");
  var fi = $("fileIn");

  dz.addEventListener("dragover", function(e) {
    e.preventDefault();
    e.stopPropagation();
    dz.classList.add("over");
  });
  dz.addEventListener("dragleave", function(e) {
    e.preventDefault();
    e.stopPropagation();
    dz.classList.remove("over");
  });
  dz.addEventListener("drop", function(e) {
    e.preventDefault();
    e.stopPropagation();
    dz.classList.remove("over");
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length > 0) {
      handleBlob(e.dataTransfer.files[0]);
    }
  });
  fi.addEventListener("change", function() {
    if (fi.files && fi.files.length > 0) {
      handleBlob(fi.files[0]);
    }
    fi.value = "";
  });
})();

/* ===== PROCESS BLOB ===== */
function handleBlob(blob) {
  /* Show player */
  if (prevURL) {
    try { URL.revokeObjectURL(prevURL); } catch(e) {}
  }
  prevURL = URL.createObjectURL(blob);
  var pl = $("player");
  pl.src = prevURL;
  pl.load();
  $("playerBox").className = "player-box show";

  /* Show spinner */
  $("resultBox").className = "result";
  $("proc").className = "proc show";

  /* Read as ArrayBuffer */
  var reader = new FileReader();
  reader.onload = function() {
    var buf = reader.result;
    var ctx = null;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      $("proc").className = "proc";
      alert(t("decodeErr"));
      return;
    }

    ctx.decodeAudioData(buf,
      function(audioBuffer) {
        try { ctx.close(); } catch(e) {}
        var hash = genHash(audioBuffer);
        showResult(hash);
      },
      function(err) {
        try { ctx.close(); } catch(e) {}
        $("proc").className = "proc";
        alert(t("decodeErr"));
      }
    );
  };
  reader.onerror = function() {
    $("proc").className = "proc";
    alert(t("decodeErr"));
  };
  reader.readAsArrayBuffer(blob);
}

/* ===== HASH ALGORITHM (STRICT) ===== */
function genHash(audioBuffer) {
  var rawData = audioBuffer.getChannelData(0);
  var blockSize = Math.floor(rawData.length / 100);
  var averages = [];

  /* Step 1: chunk averages of absolute values */
  for (var i = 0; i < 100; i++) {
    var sum = 0;
    var start = i * blockSize;
    for (var j = 0; j < blockSize; j++) {
      sum += Math.abs(rawData[start + j]);
    }
    averages.push(sum / blockSize);
  }

  /* Step 2: find max */
  var maxAvg = 0;
  for (var i = 0; i < 100; i++) {
    if (averages[i] > maxAvg) maxAvg = averages[i];
  }

  /* Step 3: normalize, boost, map to ASCII */
  var result = "";
  for (var i = 0; i < 100; i++) {
    var normalizedVol = maxAvg > 0 ? (averages[i] / maxAvg) : 0;
    var boostedVol = Math.min(normalizedVol * 1.5, 1.0);
    var charCode = Math.floor((boostedVol * 90) + 32);

    /* Escape fix: skip " (34), ' (39), \ (92) */
    if (charCode === 34 || charCode === 39 || charCode === 92) {
      charCode++;
    }

    result += String.fromCharCode(charCode);
  }

  return result;
}

/* ===== SHOW RESULT ===== */
function showResult(hash) {
  $("hashOut").textContent = hash;
  $("hashLen").textContent = hash.length + " " + t("chars");
  $("proc").className = "proc";
  $("resultBox").className = "result show";
}

/* ===== COPY ===== */
function copyHash() {
  var text = $("hashOut").textContent;
  if (!text || text.length === 0) return;

  var btn = $("copyBtn");
  var span = $("elCopyBtn");

  /* Try modern API */
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      function() { showCopied(btn, span); },
      function() { fallbackCopy(text, btn, span); }
    );
  } else {
    fallbackCopy(text, btn, span);
  }
}

function fallbackCopy(text, btn, span) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  ta.style.top = "-9999px";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
  showCopied(btn, span);
}

function showCopied(btn, span) {
  btn.classList.add("ok");
  span.textContent = t("copied");
  if (copyTimer) clearTimeout(copyTimer);
  copyTimer = setTimeout(function() {
    btn.classList.remove("ok");
    span.textContent = t("copyBtn");
    copyTimer = null;
  }, 2000);
}

/* ===== INIT ===== */
